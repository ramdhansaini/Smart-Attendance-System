<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Student</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <header class="header">
        <h1>Register Student</h1>
        <p>Create a new student profile for face recognition.</p>
    </header>
    <div class="container">
        <div class="form-card">
            <h2>Student Details</h2>
            <form action="/register" method="POST" enctype="multipart/form-data">
                <label for="name">Student Name</label>
                <input type="text" name="student_name" id="name" placeholder="Enter Student Name" required>
                <label for="roll">Roll Number</label>
                <input type="text" name="roll" id="roll" placeholder="Enter Roll Number" required>
                <label for="department">Department</label>
                <input type="text" name="department" id="department" placeholder="Enter Department" required>
                <label for="images">Student Face Images</label>
                <input type="file" id="images" name="images" accept="image/*"multiple required>
                <br><br>
                <button type="submit">Register Student</button>
            </form>
        </div>
    </div>
    <footer>
        <p>
            &copy; 2026 Face Attendance System | Developed Using Flask, OpenCV and InsightFace
        </p>
    </footer>
</body>
</html>
